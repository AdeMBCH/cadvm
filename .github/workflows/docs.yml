name: Docs

# Build the mdBook user guide AND the rustdoc API reference, then publish both to
# GitHub Pages. Pages is free for public repositories; the ubuntu runner (1x
# multiplier) keeps this within the free Actions quota.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        run: |
          version=v0.5.3
          url="https://github.com/rust-lang/mdBook/releases/download/${version}/mdbook-${version}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p "$HOME/bin"
          curl -sSL "$url" | tar -xz -C "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Build the user guide
        run: mdbook build docs

      - name: Build the API reference (rustdoc)
        run: cargo doc --no-deps --workspace

      - name: Bundle the API reference into the site (/api)
        run: |
          rm -rf docs/book/api
          cp -r target/doc docs/book/api
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=cadvm_core/index.html">\n' > docs/book/api/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
