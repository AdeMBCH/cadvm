name: Release

# On a version tag (e.g. v0.1.0), build the `cadvm` binary for Linux, macOS and
# Windows and attach them to a GitHub Release. These prebuilt binaries cover the
# version control + TUI; the geometry features still need Open CASCADE installed
# locally (see the docs).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p cadvm-cli --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/cadvm${{ matrix.ext }}" \
             "dist/cadvm-${{ matrix.target }}${{ matrix.ext }}"

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
